name: Fetch RBNZ Monetary Policy Statement

on:
  schedule:
    - cron: '0 12 * * *'   # quotidien 12h UTC (le MPS n'est publié qu'~4x/an, mais découverte + parsing sont légers)
  workflow_dispatch:          # déclenchement manuel

permissions:
  contents: write

jobs:
  fetch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          persist-credentials: true

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install pdf-parse (script only, pas ajouté au package.json de l'app)
        run: npm install --no-save pdf-parse

      - name: Fetch RBNZ Monetary Policy Statement (forecast table)
        run: node .github/scripts/fetch-rbnz-mps.mjs

      - name: Commit updated data (if changed)
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/rbnz-mps.json
          git diff --staged --quiet || git commit -m "chore: update RBNZ Monetary Policy Statement data [skip ci]"
          git push
